<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fond arrondi -->
  <rect width="256" height="256" rx="52" ry="52" fill="#b25a33"/>

  <!-- Bulle principale (grande, en bas à droite) -->
