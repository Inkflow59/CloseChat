  <polygon points="188,172 212,200 160,172" fill="rgba(255,255,255,0.30)"/>

  <!-- Trois points dans la bulle principale -->
  <circle cx="88"  cy="110" r="10" fill="#b25a33"/>
  <circle cx="118" cy="110" r="10" fill="#b25a33"/>
  <circle cx="148" cy="110" r="10" fill="#b25a33"/>
